                      "inverse-primary": "#c3c0ff",

                      "surface-container-highest": "#e0e3e5",

<body class="bg-background min-h-screen flex items-center justify-center relative overflow-hidden font-body-md text-on-background antialiased selection:bg-primary-container selection:text-on-primary-container">
<!-- Atmospheric Background Elements -->
<div class="absolute top-0 left-0 w-full h-full overflow-hidden -z-10 pointer-events-none">
<div class="absolute top-[-20%] left-[-10%] w-[50%] h-[50%] rounded-full bg-primary-fixed-dim/20 blur-[120px]"></div>
<div class="absolute bottom-[-20%] right-[-10%] w-[40%] h-[60%] rounded-full bg-secondary-fixed-dim/10 blur-[100px]"></div>
</div>
<!-- Main Authentication Container -->
<!-- Applying Strict Constraints: No navigation shell for linear/transactional flow -->
<main class="w-full max-w-[440px] px-margin-mobile md:px-0 z-10">
<!-- Glassmorphism/Modern Card Profile -->
<div class="bg-surface-container-lowest border border-outline-variant rounded-xl shadow-[0px_10px_15px_-3px_rgba(15,23,42,0.05)] p-xl relative">
<!-- Header Section -->
<div class="flex flex-col items-center mb-xl text-center">
<div class="w-12 h-12 bg-surface-container rounded-lg flex items-center justify-center mb-md border border-outline-variant">
<span aria-hidden="true" class="material-symbols-outlined text-primary text-3xl" data-weight="fill" style="font-variation-settings: 'FILL' 1;">
                        hub
                    </span>
</div>
<h1 class="font-headline-lg text-headline-lg text-primary tracking-tight mb-2">PSLW</h1>
<p class="font-body-md text-body-md text-on-surface-variant" id="auth-subtitle">Sign in to your account</p>
</div>
<!-- Form Element -->
<form class="space-y-lg" id="auth-form" onsubmit="event.preventDefault();">
<!-- Username -->
<div>
<label class="block font-label-md text-label-md text-on-surface mb-sm" for="username">Username</label>
<div class="relative">
<span class="absolute inset-y-0 left-0 flex items-center pl-3 pointer-events-none text-outline">
<span class="material-symbols-outlined text-xl">person</span>
</span>
<input class="w-full bg-surface-container-lowest border border-outline-variant text-on-surface font-body-md text-body-md rounded-lg pl-10 pr-3 py-2.5 focus:outline-none focus:border-primary focus:ring-2 focus:ring-primary/10 transition-all placeholder:text-outline-variant" id="username" name="username" placeholder="Enter your username" required="" type="text"/>
</div>
</div>
<!-- Password -->
<div>
<div class="flex justify-between items-center mb-sm">
<label class="block font-label-md text-label-md text-on-surface" for="password">Password</label>
<a class="font-body-sm text-body-sm text-primary hover:text-on-primary-fixed-variant transition-colors" href="#" id="forgot-password-link">Forgot?</a>
</div>
<div class="relative">
<span class="absolute inset-y-0 left-0 flex items-center pl-3 pointer-events-none text-outline">
<span class="material-symbols-outlined text-xl">lock</span>
</span>
<input class="w-full bg-surface-container-lowest border border-outline-variant text-on-surface font-body-md text-body-md rounded-lg pl-10 pr-10 py-2.5 focus:outline-none focus:border-primary focus:ring-2 focus:ring-primary/10 transition-all placeholder:text-outline-variant" id="password" name="password" placeholder="••••••••" required="" type="password"/>
<button class="absolute inset-y-0 right-0 flex items-center pr-3 text-outline hover:text-on-surface transition-colors" onclick="togglePasswordVisibility()" type="button">
<span class="material-symbols-outlined text-xl" id="visibility-icon">visibility</span>
</button>
</div>
</div>
<!-- Dynamic Signup Fields (Hidden by default) -->
<div class="space-y-lg hidden opacity-0 transition-opacity duration-300" id="signup-fields">
<!-- Divider -->
<div class="flex items-center gap-3 pt-2">
<div class="h-px bg-surface-container-highest flex-1"></div>
<span class="font-label-md text-label-md text-on-surface-variant uppercase tracking-wider text-xs">Setup Workspace</span>
<div class="h-px bg-surface-container-highest flex-1"></div>
</div>
<!-- AI Provider Dropdown -->
<div>
<label class="block font-label-md text-label-md text-on-surface mb-sm" for="provider">AI Provider</label>
<div class="relative">
<span class="absolute inset-y-0 left-0 flex items-center pl-3 pointer-events-none text-outline">
<span class="material-symbols-outlined text-xl">smart_toy</span>
</span>
<select class="w-full bg-surface border border-outline-variant text-on-surface font-body-md text-body-md rounded-lg pl-10 pr-10 py-2.5 appearance-none focus:outline-none focus:border-primary focus:ring-2 focus:ring-primary/10 transition-all cursor-pointer" id="provider" name="provider">
<option value="openai">OpenAI (GPT-4)</option>
<option value="gemini">Google Gemini</option>
<option value="anthropic">Anthropic Claude</option>
</select>
<span class="absolute inset-y-0 right-0 flex items-center pr-3 pointer-events-none text-outline">
<span class="material-symbols-outlined text-xl">expand_more</span>
</span>
</div>
</div>
<!-- API Key -->
<div>
<label class="block font-label-md text-label-md text-on-surface mb-sm" for="apikey">API Key</label>
<div class="relative">
<span class="absolute inset-y-0 left-0 flex items-center pl-3 pointer-events-none text-outline">
<span class="material-symbols-outlined text-xl">key</span>
</span>
<input class="w-full bg-surface-container-lowest border border-outline-variant text-on-surface font-mono-sm text-mono-sm rounded-lg pl-10 pr-3 py-2.5 focus:outline-none focus:border-primary focus:ring-2 focus:ring-primary/10 transition-all placeholder:text-outline-variant" id="apikey" name="apikey" placeholder="sk-..." type="text"/>
</div>
<p class="font-body-sm text-body-sm text-on-surface-variant mt-2 text-xs">Your key is encrypted locally and never sent to our servers.</p>
</div>
</div>
<!-- Primary Action Button -->
<button class="w-full bg-primary text-on-primary font-label-md text-label-md rounded-lg py-3 mt-4 flex items-center justify-center gap-2 hover:bg-on-primary-fixed-variant transition-colors shadow-sm active:scale-[0.98]" id="submit-btn" type="submit">
<span id="submit-btn-text">Sign In</span>
<span class="material-symbols-outlined text-[18px]">arrow_forward</span>
</button>
</form>
<!-- Mode Toggle Footer -->
<div class="mt-xl text-center">
<p class="font-body-sm text-body-sm text-on-surface-variant">
<span id="toggle-prompt">Don't have an account?</span>
<button class="text-primary font-label-md hover:text-on-primary-fixed-variant hover:underline transition-all ml-1 focus:outline-none" id="toggle-action" onclick="toggleAuthMode()" type="button">
                        Register here
                    </button>
</p>
</div>
</div>
<!-- Footer Links -->
<div class="mt-lg flex justify-center gap-6">
<a class="font-body-sm text-body-sm text-outline hover:text-on-surface transition-colors" href="#">Privacy Policy</a>
<a class="font-body-sm text-body-sm text-outline hover:text-on-surface transition-colors" href="#">Terms of Service</a>
</div>
</main>
<script>
        let isLoginMode = true;

        function togglePasswordVisibility() {
            const passwordInput = document.getElementById('password');
            const visibilityIcon = document.getElementById('visibility-icon');
            
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                visibilityIcon.textContent = 'visibility_off';
            } else {
                passwordInput.type = 'password';
                visibilityIcon.textContent = 'visibility';
            }
        }

        function toggleAuthMode() {
            isLoginMode = !isLoginMode;
            
            const signupFields = document.getElementById('signup-fields');
            const submitBtnText = document.getElementById('submit-btn-text');
            const subtitle = document.getElementById('auth-subtitle');
            const togglePrompt = document.getElementById('toggle-prompt');
            const toggleAction = document.getElementById('toggle-action');
            const forgotPasswordLink = document.getElementById('forgot-password-link');
            const form = document.getElementById('auth-form');

            if (!isLoginMode) {
                // Switch to Register Mode
                signupFields.classList.remove('hidden');
                // Small delay to allow display:block to apply before animating opacity
                setTimeout(() => {
                    signupFields.classList.remove('opacity-0');
                }, 10);
                
                submitBtnText.textContent = 'Create Account';
                subtitle.textContent = 'Join PSLW platform';
                togglePrompt.textContent = 'Already have an account?';
                toggleAction.textContent = 'Sign in';
                forgotPasswordLink.classList.add('hidden');
                
                // Add required attributes for register mode
                document.getElementById('provider').setAttribute('required', 'true');
                
            } else {
                // Switch to Login Mode
                signupFields.classList.add('opacity-0');
                
                // Wait for transition before hiding
                setTimeout(() => {
                    signupFields.classList.add('hidden');
                }, 300);

                submitBtnText.textContent = 'Sign In';
                subtitle.textContent = 'Sign in to your account';
                togglePrompt.textContent = 'Don\'t have an account?';
                toggleAction.textContent = 'Register here';
                forgotPasswordLink.classList.remove('hidden');
                
                // Remove required attributes for login mode
                document.getElementById('provider').removeAttribute('required');
            }
            
            // Add a small subtle shake to the form container to emphasize state change
            form.style.transform = 'scale(0.99)';
            setTimeout(() => {
                form.style.transform = 'scale(1)';
                form.style.transition = 'transform 0.2s cubic-bezier(0.4, 0, 0.2, 1)';
            }, 150);
        }
    </script>
</body></html>
