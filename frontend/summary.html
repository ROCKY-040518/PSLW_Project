    <main class="flex-1 md:ml-[280px] min-h-screen flex flex-col max-w-[1440px] mx-auto w-full">

                <span class="material-symbols-outlined text-lg">arrow_back</span>
                Back to Dashboard
            </a>
            <div class="flex items-center gap-4">
                <span id="summary-id-badge" class="font-mono-sm text-xs text-outline dark:text-gray-500 bg-surface-container dark:bg-gray-800 px-2 py-1 rounded">ID: —</span>

                    Completed
                </span>
            </div>
        </header>

        <div class="flex-1 p-6 md:p-10 flex flex-col lg:flex-row gap-6 overflow-hidden">
            
            <div class="w-full lg:w-1/2 flex flex-col bg-surface-container-lowest dark:bg-[#1e1e1e] rounded-xl border border-outline-variant dark:border-gray-800 h-[calc(100vh-140px)] shadow-sm transition-colors duration-300">

                        <span class="material-symbols-outlined text-outline dark:text-gray-400">description</span>
                        Original Script (STT Results)
                    </h2>
                </div>
                <div class="flex-1 overflow-y-auto p-6">
                    <p id="transcript-container" class="text-on-surface-variant dark:text-gray-300 leading-relaxed whitespace-pre-wrap"></p>
                </div>
            </div>

            <div class="w-full lg:w-1/2 flex flex-col h-[calc(100vh-140px)]">
                <div class="bg-surface-container-lowest dark:bg-[#1e1e1e] rounded-xl border border-outline-variant dark:border-gray-800 flex-1 flex flex-col overflow-hidden shadow-sm transition-colors duration-300">
                    <div class="p-5 border-b border-outline-variant dark:border-gray-800 bg-gray-50 dark:bg-gray-800/50 flex items-center gap-2 rounded-t-xl">
                        <span class="material-symbols-outlined text-primary dark:text-[#c3c0ff]" style="font-variation-settings: 'FILL' 1;">auto_awesome</span>
                        <h2 class="text-lg font-semibold text-on-surface dark:text-white">AI Summary</h2>
                    </div>
                    <div class="flex-1 overflow-y-auto p-6">
                        <h3 id="summary-title" class="text-2xl font-bold text-on-surface dark:text-white mb-6 pb-4 border-b border-gray-200 dark:border-gray-700"></h3>
                        <div id="summary-content" class="text-on-surface-variant dark:text-gray-300"></div>
                    </div>
                </div>

                <div class="mt-6 flex justify-end">
                    <button onclick="deleteSummary()" class="bg-error-container dark:bg-red-900/30 text-on-error-container dark:text-red-400 hover:bg-error hover:text-white border border-red-200 dark:border-red-800 text-sm font-medium py-2.5 px-6 rounded-lg transition-colors flex items-center gap-2">
                        <span class="material-symbols-outlined text-[20px]">delete</span>
                        Delete this File
                    </button>
                </div>
            </div>
        </div>
    </main>

    <script>
        const BASE_URL = 'http://localhost:8000';

        // 1. 다크모드 상태 동기화 (home.html과 동일하게)
        if (localStorage.getItem('theme') === 'dark' || document.documentElement.classList.contains('dark')) {
            document.documentElement.classList.add('dark');
        }

        // 2. 인증 및 파라미터 확인
        if (!localStorage.getItem('pslw_user')) { window.location.href = 'login.html'; }
        const params = new URLSearchParams(window.location.search);
        const summaryId = params.get('id');
        if (!summaryId) { window.location.href = 'home.html'; }

        // 3. 데이터 로드 및 렌더링
        async function loadSummary() {
            try {
                const res = await fetch(`${BASE_URL}/api/summary/${summaryId}`);
                if (!res.ok) throw new Error('Not found');
                const data = await res.json();

                // 헤더 업데이트
                document.getElementById('summary-id-badge').textContent = `ID: ${summaryId}`;
                document.title = `${data.filename} - PSLW`;
                document.getElementById('summary-title').textContent = data.filename;

                // STT 원본 텍스트 렌더링
                document.getElementById('transcript-container').textContent = data.transcript || '(내용 없음)';

                // AI 요약본 렌더링 (진짜 핵심!)
                const summaryRawText = data.summaryText || data.summary || '(요약 없음)';
                
                // 마크다운 파싱을 거쳐서 HTML로 삽입
                if(summaryRawText !== '(요약 없음)') {
                    document.getElementById('summary-content').innerHTML = marked.parse(summaryRawText);
                } else {
                    document.getElementById('summary-content').textContent = summaryRawText;
                }

            } catch (error) {
                console.error(error);
                alert('데이터를 불러오는 데 실패했습니다.');
                window.location.href = 'home.html';
            }
        }

        // 4. 삭제 기능
        async function deleteSummary() {
            if (!confirm('정말 이 요약 데이터를 영구 삭제하시겠습니까?')) return;
            try {
                const res = await fetch(`${BASE_URL}/api/summary/${summaryId}`, { method: 'DELETE' });
                if (res.ok) { window.location.href = 'home.html'; }
                else { alert('삭제에 실패했습니다.'); }
            } catch { alert('서버 연결 오류가 발생했습니다.'); }
        }

        document.addEventListener('DOMContentLoaded', loadSummary);
    </script>
